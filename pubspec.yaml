name: kivi_24
description: "24Digi Health App."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+2

environment:
  sdk: '>=3.7.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.5.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dropdown_button2: ^3.0.0
  firebase_auth: ^5.3.3
  firebase_core: ^3.8.1
  firebase_storage: ^12.3.2
  flutter_image_compress: ^2.3.0
  intl: ^0.19.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10
  gallery_saver_plus: ^3.2.9
  geolocator: ^13.0.2
  get: ^4.7.3
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.9.0
  gradient_borders: ^1.0.2
  syncfusion_flutter_charts: ^32.2.9
  image_picker: ^1.1.2
  path_drawing: ^1.0.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.4
  http: ^1.6.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # iOS: keep default LLDB device debugging (works with wireless + Core Device IDs).
  # If you hit DartWorker EXC_BAD_ACCESS in debug, add under flutter:  config: { enable-lldb-debugging: false }
  # then use USB (Xcode automation often misses wireless) and ./ios/flutter_run_device.sh if needed.

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/24 logo.png
    - assets/circuit.png
    - assets/fonts/male.png
    - assets/fonts/female.png
    - assets/fonts/24bracelet.png
    - assets/fonts/bannerad.png
    - assets/fonts/bracelet.png
    - assets/fonts/challenge.png
    - assets/fonts/challenge_icon.png
    - assets/fonts/c_by_ai.png
    - assets/fonts/delivery.png
    - assets/fonts/diet.png
    - assets/fonts/hieght.png
    - assets/fonts/weight.png
    - assets/fonts/insta.png
    - assets/fonts/facebook.png
    - "assets/fonts/whatsapp (1).png"
    - assets/fonts/share.png
    - "assets/fonts/share (1).png"
    - assets/fonts/body.png
    - assets/diet/
    - assets/profile/
    - assets/challenge/
    - assets/shop/
    - assets/c_by_ai/
    - assets/ai_model/
    - assets/bracelet/
    - assets/fitness_ai/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package
  # Custom fonts
  fonts:
    - family: HelveticaNeue
      fonts:
        - asset: assets/fonts/HelveticaNeueMedium.otf
    - family: HelveticaNeueThin
      fonts:
        - asset: assets/fonts/HelveticaNeueThin.otf
    - family: HelveticaNeueLight
      fonts:
        - asset: assets/fonts/HelveticaNeueLight.otf
    - family: LemonMilk
      fonts:
        - asset: assets/fonts/LEMONMILK-Regular.otf
        - asset: assets/fonts/LEMONMILK-RegularItalic.otf
          style: italic
        - asset: assets/fonts/LEMONMILK-Light.otf
          weight: 300
        - asset: assets/fonts/LEMONMILK-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/LEMONMILK-Medium.otf
          weight: 500
        - asset: assets/fonts/LEMONMILK-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/LEMONMILK-Bold.otf
          weight: 700
        - asset: assets/fonts/LEMONMILK-BoldItalic.otf
          weight: 700
          style: italic
  # For Helvetica Neue alternatives, use google_fonts package:
  # - Inter: GoogleFonts.inter()
  # - Roboto: GoogleFonts.roboto()
  # - Nunito Sans: GoogleFonts.nunitoSans()
  # All are excellent, free alternatives to Helvetica Neue
# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/24 logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
